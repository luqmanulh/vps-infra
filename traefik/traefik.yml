entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false

certificatesResolvers:
  letsencrypt:
    acme:
      # Email is provided via CLI argument in docker-compose.yml: --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      # This is required for Let's Encrypt registration and certificate renewal notifications
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
