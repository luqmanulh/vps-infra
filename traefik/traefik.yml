entryPoints:
  web:
    address: ':80'
  websecure:
    address: ':443'

providers:
  docker:
    exposedByDefault: false

certificatesResolvers:
  letsencrypt:
    acme:
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

# Middleware to redirect HTTP to HTTPS
http:
  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true
